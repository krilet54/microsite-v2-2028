*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{min-height:100vh;background:#080808;color:#F0EDE6;font-family:'DM Sans',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;overflow-x:hidden;display:flex;align-items:center;justify-content:center;padding:24px;}
a{text-decoration:none;color:inherit;}
:root{--red:#C8281E;--red2:#A8201A;--bg:#080808;--bg-card:#111111;--border-dark:rgba(255,255,255,0.07);--wrap:980px;}
.shell{width:100%;max-width:var(--wrap);position:relative;background:linear-gradient(180deg, rgba(200,40,30,0.08), rgba(200,40,30,0.02));border:1px solid var(--border-dark);border-radius:18px;padding:56px 28px;overflow:hidden;}
.shell::before,.shell::after{content:'';position:absolute;border-radius:50%;pointer-events:none;}
.shell::before{width:220px;height:220px;right:-90px;top:-90px;border:1px solid rgba(200,40,30,0.14);}
.shell::after{width:140px;height:140px;left:-50px;bottom:-50px;border:1px dashed rgba(200,40,30,0.1);}
.card{max-width:720px;margin:0 auto;text-align:center;position:relative;z-index:1;}
.kicker{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(200,40,30,0.65);margin-bottom:18px;display:inline-flex;align-items:center;gap:10px;}
.kicker::before{content:'';width:20px;height:1px;background:var(--red);}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,10vw,112px);line-height:0.92;letter-spacing:0.01em;margin-bottom:18px;}
p{font-size:18px;line-height:1.85;color:rgba(240,237,230,0.42);max-width:600px;margin:0 auto;}
.actions{margin-top:34px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 24px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:transform 0.2s,background 0.2s,border-color 0.2s;}
.btn-primary{background:var(--red);color:#fff;}
.btn-primary:hover{background:var(--red2);transform:translateY(-1px);}
.btn-secondary{border:1px solid rgba(255,255,255,0.12);color:#F0EDE6;background:rgba(255,255,255,0.03);}
.btn-secondary:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-1px);}
.note{margin-top:18px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;color:rgba(240,237,230,0.2);text-transform:uppercase;}
@media (max-width:640px){.shell{padding:42px 18px;}p{font-size:16px;}.actions{flex-direction:column;align-items:stretch;}.btn{width:100%;}}
